<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login - Nyeri Police and Community Chapel">
    <title>Login | Nyeri Police and Community Chapel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/images/church-logo.png" alt="NPCC Logo" class="auth-logo">
                <h1>Nyeri Police & Community Chapel</h1>
                <p class="subtitle">Sign In</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-full">Sign In</button>

                <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
                <p class="back-link"><a href="index.html">← Back to Home</a></p>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nyeri Police and Community Chapel. All rights reserved.</p>
    </footer>

    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const loader = app.showLoading();
                
                // Try Firebase authentication first
                const user = await Firebase.auth.signIn(email, password);
                
                // Check user role
                const userDoc = await Firebase.db.getDocument('users', user.uid);
                
                localStorage.setItem('user', JSON.stringify(user));
                if (rememberMe) {
                    localStorage.setItem('rememberMe', 'true');
                }
                
                if (userDoc && userDoc.role === 'admin') {
                    localStorage.setItem('userRole', 'admin');
                    app.hideLoading(loader);
                    app.showNotification('Welcome Admin!', 'success');
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                } else {
                    localStorage.setItem('userRole', 'member');
                    app.hideLoading(loader);
                    app.showNotification('Welcome!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                app.hideLoading();
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Login error:', error);
            }
        });

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            if (user) {
                const role = localStorage.getItem('userRole');
                if (role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
