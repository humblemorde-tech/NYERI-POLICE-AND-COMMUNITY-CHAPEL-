<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Nyeri Police and Community Chapel">
    <title>Admin Login | Nyeri Police and Community Chapel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/images/church-logo.png" alt="NPCC Logo" class="auth-logo">
                <h1>Nyeri Police & Community Chapel</h1>
                <p class="subtitle">Admin Portal</p>
            </div>

            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username or Email:</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-full">Admin Login</button>

                <p class="auth-link">Not an admin? <a href="login.html">User Login</a></p>
                <p class="back-link"><a href="index.html">← Back to Home</a></p>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nyeri Police and Community Chapel. All rights reserved.</p>
    </footer>

    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Admin credentials (should be verified against database in production)
        const ADMIN_CREDENTIALS = {
            username: 'Mordecai',
            email: 'mordecai@nyeripolice.com',
            password: 'P@ssw0rd'
        };

        // Admin login form handler
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');

            try {
                const loader = app.showLoading();
                
                // Validate admin credentials
                const isValidAdmin = (username === ADMIN_CREDENTIALS.username || username === ADMIN_CREDENTIALS.email) && 
                                    password === ADMIN_CREDENTIALS.password;

                if (isValidAdmin) {
                    // Create admin session
                    const adminUser = {
                        uid: 'admin_' + Date.now(),
                        username: ADMIN_CREDENTIALS.username,
                        email: ADMIN_CREDENTIALS.email,
                        role: 'admin'
                    };

                    localStorage.setItem('user', JSON.stringify(adminUser));
                    localStorage.setItem('userRole', 'admin');
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                    }

                    app.hideLoading(loader);
                    app.showNotification('Welcome Admin Mordecai!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1500);
                } else {
                    app.hideLoading(loader);
                    errorDiv.textContent = 'Invalid admin credentials. Please try again.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                app.hideLoading();
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Admin login error:', error);
            }
        });

        // Check if admin is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('user');
            const role = localStorage.getItem('userRole');
            if (user && role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            }
        });
    </script>
</body>
</html>
