<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign Up - Nyeri Police and Community Chapel">
    <title>Sign Up | Nyeri Police and Community Chapel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/images/church-logo.png" alt="NPCC Logo" class="auth-logo">
                <h1>Nyeri Police & Community Chapel</h1>
                <p class="subtitle">Create your account</p>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <small>Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="form-group">
                    <label for="role">Join As:</label>
                    <select id="role" name="role" required>
                        <option value="">Select...</option>
                        <option value="member">Church Member</option>
                        <option value="visitor">Visitor</option>
                    </select>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms and Conditions</label>
                </div>

                <button type="submit" class="btn btn-full">Create Account</button>

                <p class="auth-link">Already have an account? <a href="login.html">Sign In</a></p>
                <p class="back-link"><a href="index.html">← Back to Home</a></p>
            </form>

            <div id="errorMessage" class="error-message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Nyeri Police and Community Chapel. All rights reserved.</p>
    </footer>

    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Sign up form handler
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const errorDiv = document.getElementById('errorMessage');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const user = await Firebase.auth.signUp(email, password);
                
                // Save user info to Firestore
                await Firebase.db.addDocument('users', {
                    uid: user.uid,
                    fullName: fullName,
                    email: email,
                    phone: phone,
                    role: role,
                    createdAt: new Date(),
                    status: 'active'
                });

                localStorage.setItem('user', JSON.stringify(user));
                app.showNotification('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Sign up error:', error);
            }
        });
    </script>
</body>
</html>
